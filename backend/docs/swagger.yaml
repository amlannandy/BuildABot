basePath: /api/v1
definitions:
  dto.ChatBotFilters:
    properties:
      description:
        type: string
      name:
        type: string
    type: object
  dto.ChatRequest:
    properties:
      message:
        type: string
      user_identifier:
        type: string
    type: object
  dto.ChatResponse:
    properties:
      reply:
        type: string
    type: object
  dto.CreateChatBotRequest:
    type: object
  dto.ErrorResponse:
    properties:
      errors:
        items:
          type: string
        type: array
    type: object
  dto.KnowledgeBaseFilters:
    properties:
      name:
        type: string
    type: object
  dto.ListChatBotsRequest:
    properties:
      filters:
        $ref: '#/definitions/dto.ChatBotFilters'
      limit:
        type: integer
      page:
        type: integer
    type: object
  dto.ListKnowledgeBasesRequest:
    properties:
      chatbot_id:
        type: integer
      filters:
        $ref: '#/definitions/dto.KnowledgeBaseFilters'
      limit:
        type: integer
      page:
        type: integer
    type: object
  dto.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  dto.PaginatedResponse-models_ChatBot:
    properties:
      data:
        items:
          $ref: '#/definitions/models.ChatBot'
        type: array
      pagination:
        $ref: '#/definitions/dto.PaginationMeta'
    type: object
  dto.PaginatedResponse-models_KnowledgeBase:
    properties:
      data:
        items:
          $ref: '#/definitions/models.KnowledgeBase'
        type: array
      pagination:
        $ref: '#/definitions/dto.PaginationMeta'
    type: object
  dto.PaginationMeta:
    properties:
      has_more:
        type: boolean
      has_prev:
        type: boolean
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
    type: object
  dto.RegisterRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        minLength: 8
        type: string
    required:
    - email
    - name
    - password
    type: object
  dto.SuccessResponse-any:
    properties:
      data: {}
      message:
        type: string
    type: object
  dto.SuccessResponse-dto_ChatResponse:
    properties:
      data:
        $ref: '#/definitions/dto.ChatResponse'
      message:
        type: string
    type: object
  dto.SuccessResponse-dto_PaginatedResponse-models_ChatBot:
    properties:
      data:
        $ref: '#/definitions/dto.PaginatedResponse-models_ChatBot'
      message:
        type: string
    type: object
  dto.SuccessResponse-dto_PaginatedResponse-models_KnowledgeBase:
    properties:
      data:
        $ref: '#/definitions/dto.PaginatedResponse-models_KnowledgeBase'
      message:
        type: string
    type: object
  dto.SuccessResponse-models_ChatBot:
    properties:
      data:
        $ref: '#/definitions/models.ChatBot'
      message:
        type: string
    type: object
  dto.SuccessResponse-models_KnowledgeBase:
    properties:
      data:
        $ref: '#/definitions/models.KnowledgeBase'
      message:
        type: string
    type: object
  dto.SuccessResponse-models_User:
    properties:
      data:
        $ref: '#/definitions/models.User'
      message:
        type: string
    type: object
  dto.SuccessResponse-string:
    properties:
      data:
        type: string
      message:
        type: string
    type: object
  dto.UpdateChatBotRequest:
    type: object
  models.ChatBot:
    properties:
      api_key:
        type: string
      config:
        type: string
      created_at:
        type: string
      description:
        type: string
      id:
        type: integer
      integrations:
        type: string
      name:
        type: string
      updated_at:
        type: string
      user_id:
        type: integer
      workflow:
        type: string
    type: object
  models.FileType:
    enum:
    - txt
    - pdf
    type: string
    x-enum-varnames:
    - FileTypeTxt
    - FileTypePDF
  models.KnowledgeBase:
    properties:
      chatbot_id:
        type: integer
      created_at:
        type: string
      file_name:
        type: string
      file_type:
        $ref: '#/definitions/models.FileType'
      id:
        type: integer
      name:
        type: string
      s3_key:
        type: string
      updated_at:
        type: string
    type: object
  models.User:
    properties:
      avatar_url:
        type: string
      created_at:
        type: string
      email:
        type: string
      id:
        type: integer
      name:
        type: string
      updated_at:
        type: string
      verified:
        type: boolean
    type: object
host: localhost:8080
info:
  contact: {}
  description: Production-ready Go REST API
  title: My API
  version: "1.0"
paths:
  /auth/current-user:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SuccessResponse-models_User'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get current authenticated user
      tags:
      - auth
  /auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Login payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SuccessResponse-string'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Login
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      parameters:
      - description: Register payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.SuccessResponse-string'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Register a new user
      tags:
      - auth
  /chatbots/{id}:
    delete:
      parameters:
      - description: ChatBot ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SuccessResponse-any'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete a chatbot
      tags:
      - chatbots
    get:
      parameters:
      - description: ChatBot ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SuccessResponse-models_ChatBot'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get chatbot details by ID
      tags:
      - chatbots
    patch:
      consumes:
      - application/json
      parameters:
      - description: ChatBot ID
        in: path
        name: id
        required: true
        type: integer
      - description: ChatBot update payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateChatBotRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SuccessResponse-models_ChatBot'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update chatbot details
      tags:
      - chatbots
  /chatbots/{id}/chat:
    post:
      consumes:
      - application/json
      parameters:
      - description: ChatBot ID
        in: path
        name: id
        required: true
        type: integer
      - description: Chat payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.ChatRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SuccessResponse-dto_ChatResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Send a message to a chatbot
      tags:
      - chatbots
  /chatbots/create:
    post:
      consumes:
      - application/json
      parameters:
      - description: ChatBot creation payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.CreateChatBotRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.SuccessResponse-models_ChatBot'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a new chatbot
      tags:
      - chatbots
  /chatbots/list:
    post:
      consumes:
      - application/json
      parameters:
      - description: List chatbots payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.ListChatBotsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SuccessResponse-dto_PaginatedResponse-models_ChatBot'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List chatbots with pagination and filters
      tags:
      - chatbots
  /knowledge-bases/{id}:
    delete:
      parameters:
      - description: Knowledge Base ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SuccessResponse-any'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete a knowledge base by ID
      tags:
      - knowledge-bases
  /knowledge-bases/create:
    post:
      consumes:
      - multipart/form-data
      parameters:
      - description: ChatBot ID
        in: formData
        name: chatbot_id
        required: true
        type: integer
      - description: Knowledge Base name
        in: formData
        name: name
        required: true
        type: string
      - description: File to upload (.txt or .pdf)
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.SuccessResponse-models_KnowledgeBase'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a new knowledge base from an uploaded file
      tags:
      - knowledge-bases
  /knowledge-bases/list:
    post:
      consumes:
      - application/json
      parameters:
      - description: List knowledge bases payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.ListKnowledgeBasesRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SuccessResponse-dto_PaginatedResponse-models_KnowledgeBase'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List knowledge bases for a chatbot with pagination and filters
      tags:
      - knowledge-bases
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
